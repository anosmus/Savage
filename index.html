<!DOCTYPE html>
<html lang="en">
<head>
</head>

<style>
  @font-face {
  font-family: 'Prime';
  src: url('../fonts/Prime-Regular.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}

* {
  padding: 0;
  margin: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background-color: #000;
  position: relative;
  z-index: 1;
  overflow: hidden;
  cursor: none;
}

#progress {
  display: none;
  font-family: 'Prime', serif;
  position: absolute;
  z-index: 2;
  top: 13%;
  left: 44%;
  right: 39%;
}

#progress .value {
  color: #fff;
  font-size: 36px;
  width: 86px;
  text-align: right;
  text-shadow: 0 0 3px rgba(0, 0, 0, 0.8);
}

#progress .value::after {
  content: '%';
  font-size: 0.7em;
  margin-left: 5px;
}

#progress .bar-container {
  background: linear-gradient(0deg, transparent 0%, rgba(255, 255, 255, 0.3) 50%, transparent 100%);
  border-radius: 10px;
  height: 20px;
}

#progress .bar-progress {
  background-color: #fff;
  border-radius: 10px;
  box-shadow: 0 0 3px 0 rgba(0, 0, 0, 0.7);
  height: 100%;
  width: 0;
}

#progress .name {
  display: none;
}



</style>
<body>
<video width="100%" height="100%" autoplay id="myaudio">
  <source src="https://drive.google.com/file/d/1PYQq2EkrrTNNIarMayfca4ilBPrK92_c/view?usp=sharing" type="video/mp4">
</video>
<script>
  var audio = document.getElementById("myaudio");
  audio.volume = 0.04;
</script>
</body>
</html>
